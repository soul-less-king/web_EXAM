<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Transaction Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <header>
            <h1>MyFinance Transaction Manager</h1>
            <p>Manage your transactions with a REST API</p>
        </header>

        <main>
            <!-- Summary Cards -->
            <section id="overview">
                <h2>Financial Overview</h2>
                <div class="dashboard-grid">
                    <article class="card card--success">
                        <h3>Total Income</h3>
                        <p class="amount" id="total-income">0 QAR</p>
                    </article>
                    <article class="card card--danger">
                        <h3>Total Expenses</h3>
                        <p class="amount" id="total-expenses">0 QAR</p>
                    </article>
                    <article class="card">
                        <h3>Balance</h3>
                        <p class="amount" id="total-balance">0 QAR</p>
                    </article>
                </div>
            </section>

            <!-- Add/Edit Transaction Form -->
            <section>
                <h2 id="form-title">Add Transaction</h2>
                <form id="transaction-form">
                    <input type="hidden" id="edit-id" name="id" value="">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="desc">Description</label>
                            <input type="text" id="desc" name="description" placeholder="e.g., Groceries" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount (QAR)</label>
                            <input type="number" id="amount" name="amount" placeholder="0" min="0" step="0.01" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="type">Type</label>
                            <select id="type" name="type" required>
                                <option value="income">Income</option>
                                <option value="expense">Expense</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="Salary">Salary</option>
                                <option value="Freelance">Freelance</option>
                                <option value="Food">Food</option>
                                <option value="Housing">Housing</option>
                                <option value="Transport">Transport</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Education">Education</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Add Transaction</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">Cancel Edit</button>
                    </div>
                </form>
            </section>

            <!-- Filter and Transaction List -->
            <section>
                <h2>Transactions</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="search">Search</label>
                        <input type="text" id="search" name="search" placeholder="Search by description...">
                    </div>
                    <div class="form-group">
                        <label for="filter-type">Filter by Type</label>
                        <select id="filter-type" name="filter-type">
                            <option value="all">All</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-body">
                            <tr>
                                <td colspan="5" class="empty-message">Loading transactions...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 MyFinance. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
