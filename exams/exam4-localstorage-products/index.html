<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore Product Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <header>
            <h1>🎮 TechStore Product Manager</h1>
            <p>Browse products, manage inventory locally with persistent storage</p>
        </header>

        <main>
            <!--
                ====================================================
                EXAM 4: localStorage — TechStore Product Manager
                Total: 100 marks | Time: 60 minutes
                ====================================================

                INSTRUCTIONS:
                - Write ALL your JavaScript in js/app.js
                - Use localStorage to persist all changes
                - Fix one CSS rule as indicated in Q1
                - Open with Live Server to test

                API URL: https://freetestapi.com/api/v1/products

                PRODUCT SHAPE (from API):
                {
                    "id": 1,
                    "name": "Laptop Pro X1",
                    "description": "...",
                    "price": 1299.99,
                    "category": "Electronics",
                    "stock": 45,
                    "image": "https://..."
                }
            -->

            <!-- Summary Cards -->
            <section>
                <h2>Inventory Overview</h2>
                <div class="dashboard-grid">
                    <article class="card card--primary">
                        <h3>Total Products</h3>
                        <p class="amount" id="total-products">0</p>
                    </article>
                    <article class="card card--success">
                        <h3>In Stock</h3>
                        <p class="amount" id="in-stock-count">0</p>
                    </article>
                    <article class="card card--danger">
                        <h3>Out of Stock</h3>
                        <p class="amount" id="out-of-stock-count">0</p>
                    </article>
                    <article class="card card--warning">
                        <h3>Total Value</h3>
                        <p class="amount" id="total-value">$0</p>
                    </article>
                </div>
            </section>

            <!-- Filter & Sort -->
            <section>
                <h2>Product Catalog</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="search">Search Products</label>
                        <input type="text" id="search" placeholder="Search by name...">
                    </div>
                    <div class="form-group">
                        <label for="filter-stock">Filter by Stock</label>
                        <select id="filter-stock">
                            <option value="all">All Products</option>
                            <option value="in-stock">In Stock Only</option>
                            <option value="out-of-stock">Out of Stock Only</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sort-options">Sort By</label>
                        <select id="sort-options">
                            <option value="all">Default</option>
                            <option value="name">Name (A-Z)</option>
                            <option value="price-low">Price (Low → High)</option>
                            <option value="price-high">Price (High → Low)</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Product Grid -->
            <section>
                <div id="product-grid" class="grid-container">
                    <p class="empty-message">Loading products...</p>
                </div>
            </section>

            <!-- Add / Edit Product Form -->
            <section>
                <h2 id="form-title">Add New Product</h2>
                <form id="product-form">
                    <input type="hidden" id="edit-id" value="">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-name">Product Name</label>
                            <input type="text" id="product-name" name="name" placeholder="e.g., Wireless Mouse" required>
                        </div>
                        <div class="form-group">
                            <label for="product-category">Category</label>
                            <input type="text" id="product-category" name="category" placeholder="e.g., Electronics" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-price">Price ($)</label>
                            <input type="number" id="product-price" name="price" min="0" step="0.01" placeholder="29.99" required>
                        </div>
                        <div class="form-group">
                            <label for="product-stock">Stock Quantity</label>
                            <input type="number" id="product-stock" name="stock" min="0" placeholder="100" required>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 16px;">
                        <label for="product-description">Description</label>
                        <input type="text" id="product-description" name="description" placeholder="Brief description..." required>
                    </div>
                    <div class="btn-group">
                        <button type="submit" id="submit-btn" class="btn btn-primary">Add Product</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">Cancel Edit</button>
                    </div>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 TechStore. Exam 4 — localStorage.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
