<section class="form-section">
    <h2 id="form-title">Add New Recipe</h2>
    <form id="recipe-form">
        <div class="form-group">
            <label for="recipe-name">Recipe Name</label>
            <input type="text" id="recipe-name" name="name" required>
        </div>

        <div class="form-group">
            <label for="recipe-description">Description</label>
            <textarea id="recipe-description" name="description" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label for="recipe-image">Image URL</label>
            <input type="url" id="recipe-image" name="image" placeholder="https://images.unsplash.com/..." required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="recipe-prepTime">Prep Time (min)</label>
                <input type="number" id="recipe-prepTime" name="prepTime" min="0" required>
            </div>
            <div class="form-group">
                <label for="recipe-cookTime">Cook Time (min)</label>
                <input type="number" id="recipe-cookTime" name="cookTime" min="0" required>
            </div>
            <div class="form-group">
                <label for="recipe-servings">Servings</label>
                <input type="number" id="recipe-servings" name="servings" min="1" required>
            </div>
        </div>

        <div class="form-group">
            <label for="recipe-category">Category</label>
            <select id="recipe-category" name="category" required>
                <option value="">Select a category</option>
                <option value="Main Course">Main Course</option>
                <option value="Dessert">Dessert</option>
                <option value="Breakfast">Breakfast</option>
                <option value="Appetizer">Appetizer</option>
                <option value="Soup">Soup</option>
            </select>
        </div>

        <div class="form-group">
            <label for="recipe-cuisine">Cuisine</label>
            <input type="text" id="recipe-cuisine" name="cuisine" placeholder="e.g. Qatari, Italian..." required>
        </div>

        <div class="form-group">
            <label for="recipe-difficulty">Difficulty</label>
            <select id="recipe-difficulty" name="difficulty" required>
                <option value="">Select difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <div class="form-group">
            <label for="recipe-ingredients">Ingredients</label>
            <textarea id="recipe-ingredients" name="ingredients" rows="3" placeholder="e.g. chicken, rice, onions..." required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn btn-primary">Add Recipe</button>
            <button type="button" id="cancel-btn" class="btn btn-secondary hidden" onclick="cancelEdit()">Cancel</button>
        </div>
    </form>
</section>
